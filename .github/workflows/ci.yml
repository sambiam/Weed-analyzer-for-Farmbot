name: CI
on:
  push:
  pull_request:
permissions:
  contents: read
jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e ".[dev]"
      - name: Format
        run: ruff format --check .
      - name: Lint
        run: ruff check .
      - name: Unit tests
        run: pytest
      - name: Verify app configuration schema
        run: python .github/scripts/verify_config.py
      - name: Verify OpenCV single-thread configuration
        run: |
          python - <<'PY'
          import cv2
          from farmbot_vision import vision  # importing sets threads to 1
          assert cv2.getNumThreads() == 1, cv2.getNumThreads()
          print("OpenCV threads:", cv2.getNumThreads())
          PY
        env:
          PYTHONPATH: farmbot_vision/src
  docker:
    strategy:
      matrix:
        include:
          - platform: linux/amd64
            arch: amd64
          - platform: linux/arm64
            arch: aarch64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - name: Build ${{ matrix.arch }} image
        uses: docker/build-push-action@v6
        with:
          context: farmbot_vision
          platforms: ${{ matrix.platform }}
          push: false
          load: ${{ matrix.arch == 'amd64' }}
          tags: farmbot-vision:test-${{ matrix.arch }}
          build-args: |
            BUILD_VERSION=0.2.1
            BUILD_ARCH=${{ matrix.arch }}
      - name: Smoke-test container health endpoint (amd64)
        if: matrix.arch == 'amd64'
        run: |
          docker run -d --name farmbot-vision-test -p 8099:8099 \
            farmbot-vision:test-amd64
          for attempt in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:8099/health > health.json; then
              echo "health endpoint responded"; break
            fi
            sleep 2
          done
          cat health.json
          curl --path-as-is -fsS http://127.0.0.1:8099/ > dashboard.html
          curl --path-as-is -fsS http://127.0.0.1:8099// > duplicate-dashboard.html
          grep -q 'FarmBot Vision' dashboard.html
          grep -q 'FarmBot Vision' duplicate-dashboard.html
          # Health must report single-thread OpenCV and the selected resolution.
          python - <<'PY'
          import json
          data = json.load(open("health.json"))
          assert data["status"] == "ok", data
          assert data["opencv_threads"] == 1, data
          assert data["analysis_resolution"] == "960x720", data
          assert data["analysis_pixels"] == 960 * 720, data
          print("health OK:", data["version"], data["contract_version"])
          PY
          docker rm -f farmbot-vision-test
